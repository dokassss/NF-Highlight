<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NF·highlight — XML</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --border: #25252c;
    --text: #e8e8ec;
    --muted: #5a5a68;
    --yellow: #f5e642;
    --green:  #42f5a7;
    --blue:   #42c5f5;
    --orange: #f59642;
    --pink:   #f542b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .card-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .logo span { color: var(--yellow); }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .card-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

  /* DROP ZONE */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.over { border-color: var(--yellow); background: rgba(245,230,66,.04); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 32px; margin-bottom: 12px; }
  .drop-zone h3 { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
  .drop-zone p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .file-name { margin-top: 8px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--yellow); }

  /* FIELDS */
  .fields { display: flex; flex-direction: column; gap: 10px; display: none; }
  .fields.visible { display: flex; }

  .field-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  .field-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .field-info { flex: 1; min-width: 0; }
  .field-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 3px; letter-spacing: .5px; text-transform: uppercase; }
  .field-value { font-size: 13px; font-weight: 600; word-break: break-word; }
  .field-empty { font-size: 12px; color: var(--muted); font-style: italic; font-family: 'DM Mono', monospace; }

  /* BUTTON */
  .btn {
    width: 100%;
    padding: 15px;
    background: var(--yellow);
    color: #0e0e10;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .btn:hover { background: #f0da00; transform: translateY(-1px); }
  .btn.visible { display: block; }

  /* STATUS */
  .status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 0 0 4px;
    display: none;
  }
  .status.visible { display: block; }
  .status.ok { color: var(--green); }
  .status.err { color: #f54242; }

  .privacy {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 0 28px 20px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">NF<span>·</span>highlight</div>
    <div class="subtitle">XML NF-e → PDF com destaques · 100% local</div>
  </div>

  <div class="card-body">

    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".xml" id="fileInput">
      <div class="drop-icon">📋</div>
      <h3>Arraste o XML da NF-e aqui</h3>
      <p>ou clique para selecionar o arquivo</p>
      <div class="file-name" id="fileName"></div>
    </div>

    <div class="fields" id="fields">
      <div class="field-row">
        <div class="field-dot" style="background:#f5e642"></div>
        <div class="field-info">
          <div class="field-label">Emitente</div>
          <div class="field-value" id="f-emit-nome">—</div>
          <div class="field-value" id="f-emit-cnpj" style="font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;color:#aaa"></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#f59642"></div>
        <div class="field-info">
          <div class="field-label">Nº da Nota Fiscal</div>
          <div class="field-value" id="f-nf-num">—</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#42c5f5"></div>
        <div class="field-info">
          <div class="field-label">Destinatário</div>
          <div class="field-value" id="f-dest-nome">—</div>
          <div class="field-value" id="f-dest-cnpj" style="font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;color:#aaa"></div>
          <div class="field-value" id="f-dest-data" style="font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;color:#aaa"></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#42f5a7"></div>
        <div class="field-info">
          <div class="field-label">Valor Total da Nota</div>
          <div class="field-value" id="f-valor">—</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#f542b0"></div>
        <div class="field-info">
          <div class="field-label">NF de Origem (Dados Adicionais)</div>
          <div class="field-value" id="f-dados">—</div>
        </div>
      </div>
    </div>

    <div class="status" id="status"></div>
    <button class="btn" id="btnPDF">⬇ Gerar PDF com destaques</button>

  </div>

  <div class="privacy">🔒 nenhum dado é enviado para servidores externos</div>
</div>

<script>
// ── FILE INPUT ────────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
let parsedData  = null;

fileInput.addEventListener('change', e => e.target.files[0] && readXML(e.target.files[0]));
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  e.dataTransfer.files[0] && readXML(e.dataTransfer.files[0]);
});

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status visible' + (type ? ' '+type : '');
}

// ── XML PARSING ───────────────────────────────────────────────────────────────
function tag(doc, ...names) {
  for (const name of names) {
    const el = doc.getElementsByTagName(name)[0];
    if (el && el.textContent.trim()) return el.textContent.trim();
  }
  return '';
}

function formatCNPJ(v) {
  const d = v.replace(/\D/g,'');
  if (d.length===14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  if (d.length===11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  return v;
}

function formatDate(v) {
  // dhEmi format: 2025-11-01T00:00:00-03:00  or  2025-11-01
  const m = v.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : v;
}

function formatMoney(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

// Extract NF origin number from infCpl
// Matches patterns like: NF COMPLEMENTAR IPI 000003878-1, NF COMPLEMENTA 000.003.881-1, etc.
function extractNFOrigem(txt) {
  if (!txt) return txt;
  // Match number before -1 or -01 (handles zero-padded and dotted formats)
  const m = txt.match(/(?:NF|NOTA\s+FISCAL)\b.*?(?:0+\.?)*?(\d{3,6})\s*[-–]\s*0?1/i);
  if (m) return `${txt.trim()} → Nº origem: ${m[1]}`;
  return txt.trim();
}

function readXML(file) {
  document.getElementById('fileName').textContent = file.name;
  setStatus('Lendo XML…');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(e.target.result, 'text/xml');

      const erroXML = doc.querySelector('parsererror');
      if (erroXML) { setStatus('Arquivo XML inválido.', 'err'); return; }

      parsedData = {
        emitNome: tag(doc, 'xNome'),   // first xNome = emitente
        emitCNPJ: formatCNPJ(tag(doc, 'emit > CNPJ') || (() => {
          // fallback: get CNPJ inside emit element
          const emit = doc.getElementsByTagName('emit')[0];
          return emit ? (tag(emit,'CNPJ') || tag(emit,'CPF') || '') : '';
        })()),
        nfNum:    tag(doc, 'nNF'),
        destNome: (() => {
          const dest = doc.getElementsByTagName('dest')[0];
          return dest ? tag(dest,'xNome') : '';
        })(),
        destCNPJ: formatCNPJ((() => {
          const dest = doc.getElementsByTagName('dest')[0];
          return dest ? (tag(dest,'CNPJ') || tag(dest,'CPF') || '') : '';
        })()),
        destData: formatDate(tag(doc,'dhEmi','dEmi')),
        valor:    formatMoney(tag(doc,'vNF')),
        dados:    extractNFOrigem(tag(doc,'infCpl','infAdFisco')),
      };

      // Fix emitNome vs destNome collision (both use xNome)
      const xNomes = doc.getElementsByTagName('xNome');
      if (xNomes.length >= 2) {
        parsedData.emitNome = xNomes[0].textContent.trim();
        parsedData.destNome = xNomes[1].textContent.trim();
      }

      // Fix emitCNPJ
      const emitEl = doc.getElementsByTagName('emit')[0];
      if (emitEl) {
        const cnpjEl = emitEl.getElementsByTagName('CNPJ')[0] || emitEl.getElementsByTagName('CPF')[0];
        parsedData.emitCNPJ = cnpjEl ? formatCNPJ(cnpjEl.textContent.trim()) : '';
      }

      // Fix destCNPJ
      const destEl = doc.getElementsByTagName('dest')[0];
      if (destEl) {
        const cnpjEl = destEl.getElementsByTagName('CNPJ')[0] || destEl.getElementsByTagName('CPF')[0];
        parsedData.destCNPJ = cnpjEl ? formatCNPJ(cnpjEl.textContent.trim()) : '';
      }

      // Fill UI
      setText('f-emit-nome', parsedData.emitNome);
      setText('f-emit-cnpj', parsedData.emitCNPJ);
      setText('f-nf-num',    'Nº ' + parsedData.nfNum);
      setText('f-dest-nome', parsedData.destNome);
      setText('f-dest-cnpj', parsedData.destCNPJ);
      setText('f-dest-data', 'Emissão: ' + parsedData.destData);
      setText('f-valor',     parsedData.valor);
      setText('f-dados',     parsedData.dados || '—');

      document.getElementById('fields').classList.add('visible');
      document.getElementById('btnPDF').classList.add('visible');
      setStatus('XML lido com sucesso!', 'ok');
    } catch(err) {
      setStatus('Erro ao ler XML: ' + err.message, 'err');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (!val || val === 'R$ 0,00' || val === 'Nº ') { el.textContent = '—'; el.style.opacity='.4'; }
  else { el.textContent = val; el.style.opacity='1'; }
}

// ── PDF GENERATION ────────────────────────────────────────────────────────────
document.getElementById('btnPDF').addEventListener('click', generatePDF);

async function generatePDF() {
  if (!parsedData) return;
  setStatus('Gerando PDF…', '');

  try {
    // Build PDF via canvas → image → print window
    const fields = [
      { label: 'EMITENTE',                       color: '#f5e642', icon: '🏭', lines: [parsedData.emitNome, parsedData.emitCNPJ] },
      { label: 'Nº DA NOTA FISCAL',              color: '#f59642', icon: '🔢', lines: ['Nº ' + parsedData.nfNum] },
      { label: 'DESTINATÁRIO',                   color: '#42c5f5', icon: '📦', lines: [parsedData.destNome, parsedData.destCNPJ, parsedData.destData ? 'Emissão: ' + parsedData.destData : ''] },
      { label: 'VALOR TOTAL DA NOTA',            color: '#42f5a7', icon: '💰', lines: [parsedData.valor] },
      { label: 'NF DE ORIGEM (DADOS ADICIONAIS)',color: '#f542b0', icon: '📎', lines: [parsedData.dados || '—'] },
    ];

    const W = 794, MARGIN = 48, BLOCK_PAD = 16;
    const canvas  = document.createElement('canvas');
    canvas.width  = W;

    // First pass: calculate total height
    const ctx = canvas.getContext('2d');
    let totalH = 80; // header
    fields.forEach(f => {
      const validLines = f.lines.filter(l => l && l.trim() && l !== 'Nº ');
      totalH += BLOCK_PAD * 2 + 22 + validLines.length * 26 + 16;
    });
    totalH += 60; // footer
    canvas.height = totalH;

    // Background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, totalH);

    // ── Header ──
    ctx.fillStyle = '#111113';
    ctx.fillRect(0, 0, W, 68);

    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = '#f5e642';
    ctx.fillText('NF·highlight', MARGIN, 38);

    ctx.font = '11px Arial';
    ctx.fillStyle = '#888';
    ctx.fillText('Resumo da Nota Fiscal — gerado automaticamente', MARGIN, 56);

    // NF badge
    const nfLabel = 'NF ' + (parsedData.nfNum || '—');
    ctx.fillStyle = '#f59642';
    roundRect(ctx, W - 130, 18, 85, 30, 5);
    ctx.fill();
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#111';
    ctx.fillText(nfLabel, W - 122, 38);

    // ── Blocks ──
    let y = 80;
    fields.forEach(f => {
      const validLines = f.lines.filter(l => l && l.trim() && l !== 'Nº ');
      if (!validLines.length) return;

      const blockH = BLOCK_PAD * 2 + 22 + validLines.length * 26;

      // Background tint
      ctx.fillStyle = f.color;
      ctx.globalAlpha = 0.12;
      roundRect(ctx, MARGIN, y, W - MARGIN*2, blockH, 6);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Left accent bar
      ctx.fillStyle = f.color;
      ctx.globalAlpha = 1;
      ctx.fillRect(MARGIN, y, 4, blockH);

      // Label
      ctx.font = 'bold 10px Arial';
      ctx.fillStyle = f.color;
      ctx.fillText(f.icon + '  ' + f.label, MARGIN + 14, y + BLOCK_PAD + 10);

      // Value lines with highlight strip
      validLines.forEach((line, i) => {
        const lineY = y + BLOCK_PAD + 22 + i * 26;
        const textW = Math.min(ctx.measureText(line).width + 12, W - MARGIN*2 - 20);

        // Highlight strip
        ctx.fillStyle = f.color;
        ctx.globalAlpha = 0.45;
        roundRect(ctx, MARGIN + 12, lineY - 17, textW, 22, 3);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Text
        ctx.font = 'bold 14px Arial';
        ctx.fillStyle = '#111111';
        ctx.fillText(line, MARGIN + 16, lineY);
      });

      y += blockH + 14;
    });

    // ── Footer ──
    ctx.fillStyle = '#eee';
    ctx.fillRect(0, totalH - 44, W, 1);
    ctx.font = '9px Arial';
    ctx.fillStyle = '#aaa';
    const now = new Date().toLocaleString('pt-BR');
    ctx.fillText('Gerado em ' + now + ' · nenhum dado foi enviado a servidores externos', MARGIN, totalH - 20);

    // ── Output: open in new tab as image, user can print/save ──
    const imgData = canvas.toDataURL('image/png');
    const win = window.open('', '_blank');
    if (!win) {
      setStatus('Popup bloqueado! Permita popups para este site e tente novamente.', 'err');
      return;
    }
    win.document.write(`<!DOCTYPE html><html><head>
      <title>NF_${parsedData.nfNum || 'destaque'}</title>
      <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f0f0f0; display:flex; flex-direction:column; align-items:center; padding:20px; font-family:Arial,sans-serif; }
        img { max-width:100%; box-shadow:0 4px 24px rgba(0,0,0,.15); background:#fff; }
        .toolbar { margin-bottom:16px; display:flex; gap:10px; }
        button { padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold; }
        .btn-print { background:#f5e642; color:#111; }
        .btn-save  { background:#42f5a7; color:#111; }
        .btn-print:hover { background:#e6d600; }
        .btn-save:hover  { background:#00e680; }
      </style>
    </head><body>
      <div class="toolbar">
        <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Salvar como PDF</button>
        <button class="btn-save" onclick="dl()">⬇ Baixar imagem PNG</button>
      </div>
      <img src="${imgData}" />
      <script>
        function dl() {
          const a = document.createElement('a');
          a.href = '${imgData}';
          a.download = 'NF_${parsedData.nfNum || 'destaque'}.png';
          a.click();
        }
      <\/script>
    </body></html>`);
    win.document.close();

    const btn = document.getElementById('btnPDF');
    btn.textContent = '✅ PDF aberto em nova aba';
    setStatus('Pronto! Use "Imprimir → Salvar como PDF" na aba que abriu.', 'ok');

  } catch(err) {
    setStatus('Erro ao gerar PDF: ' + err.message, 'err');
    console.error(err);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
// Simple word-wrap
function wrapText(text, font, size, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line+' '+word : word;
    if (font.widthOfTextAtSize(test, size) > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines.slice(0, 5); // max 5 lines
}
</script>
</body>
</html>
