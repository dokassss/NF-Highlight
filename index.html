<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NF·highlight — XML</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --border: #25252c;
    --text: #e8e8ec;
    --muted: #5a5a68;
    --yellow: #f5e642;
    --green:  #42f5a7;
    --blue:   #42c5f5;
    --orange: #f59642;
    --pink:   #f542b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .card-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .logo span { color: var(--yellow); }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .card-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

  /* DROP ZONE */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.over { border-color: var(--yellow); background: rgba(245,230,66,.04); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 32px; margin-bottom: 12px; }
  .drop-zone h3 { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
  .drop-zone p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .file-name { margin-top: 8px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--yellow); }

  /* FIELDS */
  .fields { display: flex; flex-direction: column; gap: 10px; display: none; }
  .fields.visible { display: flex; }

  .field-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  .field-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .field-info { flex: 1; min-width: 0; }
  .field-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 3px; letter-spacing: .5px; text-transform: uppercase; }
  .field-value { font-size: 13px; font-weight: 600; word-break: break-word; }
  .field-empty { font-size: 12px; color: var(--muted); font-style: italic; font-family: 'DM Mono', monospace; }

  /* BUTTON */
  .btn {
    width: 100%;
    padding: 15px;
    background: var(--yellow);
    color: #0e0e10;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .btn:hover { background: #f0da00; transform: translateY(-1px); }
  .btn.visible { display: block; }

  /* STATUS */
  .status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 0 0 4px;
    display: none;
  }
  .status.visible { display: block; }
  .status.ok { color: var(--green); }
  .status.err { color: #f54242; }

  .privacy {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 0 28px 20px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">NF<span>·</span>highlight</div>
    <div class="subtitle">XML NF-e → PDF com destaques · 100% local</div>
  </div>

  <div class="card-body">

    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".xml" id="fileInput">
      <div class="drop-icon">📋</div>
      <h3>Arraste o XML da NF-e aqui</h3>
      <p>ou clique para selecionar o arquivo</p>
      <div class="file-name" id="fileName"></div>
    </div>

    <div class="fields" id="fields">
      <div class="field-row">
        <div class="field-dot" style="background:#f5e642"></div>
        <div class="field-info">
          <div class="field-label">Emitente</div>
          <div class="field-value" id="f-emit-nome">—</div>
          <div class="field-value" id="f-emit-cnpj" style="font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;color:#aaa"></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#f59642"></div>
        <div class="field-info">
          <div class="field-label">Nº da Nota Fiscal</div>
          <div class="field-value" id="f-nf-num">—</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#42c5f5"></div>
        <div class="field-info">
          <div class="field-label">Destinatário</div>
          <div class="field-value" id="f-dest-nome">—</div>
          <div class="field-value" id="f-dest-cnpj" style="font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;color:#aaa"></div>
          <div class="field-value" id="f-dest-data" style="font-size:11px;font-family:'DM Mono',monospace;margin-top:2px;color:#aaa"></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#42f5a7"></div>
        <div class="field-info">
          <div class="field-label">Valor Total da Nota</div>
          <div class="field-value" id="f-valor">—</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-dot" style="background:#f542b0"></div>
        <div class="field-info">
          <div class="field-label">NF de Origem (Dados Adicionais)</div>
          <div class="field-value" id="f-dados">—</div>
        </div>
      </div>
    </div>

    <div class="status" id="status"></div>
    <button class="btn" id="btnPDF">⬇ Gerar PDF com destaques</button>

  </div>

  <div class="privacy">🔒 nenhum dado é enviado para servidores externos</div>
</div>

<script>
// ── FILE INPUT ────────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
let parsedData  = null;

fileInput.addEventListener('change', e => e.target.files[0] && readXML(e.target.files[0]));
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  e.dataTransfer.files[0] && readXML(e.dataTransfer.files[0]);
});

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status visible' + (type ? ' '+type : '');
}

// ── XML PARSING ───────────────────────────────────────────────────────────────
function tag(doc, ...names) {
  for (const name of names) {
    const el = doc.getElementsByTagName(name)[0];
    if (el && el.textContent.trim()) return el.textContent.trim();
  }
  return '';
}

function formatCNPJ(v) {
  const d = v.replace(/\D/g,'');
  if (d.length===14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  if (d.length===11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  return v;
}

function formatDate(v) {
  // dhEmi format: 2025-11-01T00:00:00-03:00  or  2025-11-01
  const m = v.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : v;
}

function formatMoney(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

// Extract NF origin number from infCpl
// Matches patterns like: NF COMPLEMENTAR IPI 000003878-1, NF COMPLEMENTA 000.003.881-1, etc.
function extractNFOrigem(txt) {
  if (!txt) return txt;
  // Match number before -1 or -01 (handles zero-padded and dotted formats)
  const m = txt.match(/(?:NF|NOTA\s+FISCAL)\b.*?(?:0+\.?)*?(\d{3,6})\s*[-–]\s*0?1/i);
  if (m) return `${txt.trim()} → Nº origem: ${m[1]}`;
  return txt.trim();
}

function readXML(file) {
  document.getElementById('fileName').textContent = file.name;
  setStatus('Lendo XML…');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(e.target.result, 'text/xml');

      const erroXML = doc.querySelector('parsererror');
      if (erroXML) { setStatus('Arquivo XML inválido.', 'err'); return; }

      parsedData = {
        emitNome: tag(doc, 'xNome'),   // first xNome = emitente
        emitCNPJ: formatCNPJ(tag(doc, 'emit > CNPJ') || (() => {
          // fallback: get CNPJ inside emit element
          const emit = doc.getElementsByTagName('emit')[0];
          return emit ? (tag(emit,'CNPJ') || tag(emit,'CPF') || '') : '';
        })()),
        nfNum:    tag(doc, 'nNF'),
        destNome: (() => {
          const dest = doc.getElementsByTagName('dest')[0];
          return dest ? tag(dest,'xNome') : '';
        })(),
        destCNPJ: formatCNPJ((() => {
          const dest = doc.getElementsByTagName('dest')[0];
          return dest ? (tag(dest,'CNPJ') || tag(dest,'CPF') || '') : '';
        })()),
        destData: formatDate(tag(doc,'dhEmi','dEmi')),
        valor:    formatMoney(tag(doc,'vNF')),
        dados:    extractNFOrigem(tag(doc,'infCpl','infAdFisco')),
      };

      // Fix emitNome vs destNome collision (both use xNome)
      const xNomes = doc.getElementsByTagName('xNome');
      if (xNomes.length >= 2) {
        parsedData.emitNome = xNomes[0].textContent.trim();
        parsedData.destNome = xNomes[1].textContent.trim();
      }

      // Fix emitCNPJ
      const emitEl = doc.getElementsByTagName('emit')[0];
      if (emitEl) {
        const cnpjEl = emitEl.getElementsByTagName('CNPJ')[0] || emitEl.getElementsByTagName('CPF')[0];
        parsedData.emitCNPJ = cnpjEl ? formatCNPJ(cnpjEl.textContent.trim()) : '';
      }

      // Fix destCNPJ
      const destEl = doc.getElementsByTagName('dest')[0];
      if (destEl) {
        const cnpjEl = destEl.getElementsByTagName('CNPJ')[0] || destEl.getElementsByTagName('CPF')[0];
        parsedData.destCNPJ = cnpjEl ? formatCNPJ(cnpjEl.textContent.trim()) : '';
      }

      // Fill UI
      setText('f-emit-nome', parsedData.emitNome);
      setText('f-emit-cnpj', parsedData.emitCNPJ);
      setText('f-nf-num',    'Nº ' + parsedData.nfNum);
      setText('f-dest-nome', parsedData.destNome);
      setText('f-dest-cnpj', parsedData.destCNPJ);
      setText('f-dest-data', 'Emissão: ' + parsedData.destData);
      setText('f-valor',     parsedData.valor);
      setText('f-dados',     parsedData.dados || '—');

      document.getElementById('fields').classList.add('visible');
      document.getElementById('btnPDF').classList.add('visible');
      setStatus('XML lido com sucesso!', 'ok');
    } catch(err) {
      setStatus('Erro ao ler XML: ' + err.message, 'err');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (!val || val === 'R$ 0,00' || val === 'Nº ') { el.textContent = '—'; el.style.opacity='.4'; }
  else { el.textContent = val; el.style.opacity='1'; }
}

// ── PDF GENERATION ────────────────────────────────────────────────────────────
document.getElementById('btnPDF').addEventListener('click', generatePDF);

async function generatePDF() {
  if (!parsedData) return;
  setStatus('Gerando PDF…', '');

  const { PDFDocument, rgb, StandardFonts } = PDFLib;

  const doc  = await PDFDocument.create();
  const page = doc.addPage([595, 842]); // A4
  const { width, height } = page.getSize();

  const fontBold   = await doc.embedFont(StandardFonts.HelveticaBold);
  const fontNormal = await doc.embedFont(StandardFonts.Helvetica);

  // ── helpers ──
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    return rgb(r,g,b);
  }

  function drawHighlightedBlock(opts) {
    const { y, label, lines, color, icon } = opts;
    const blockH  = 20 + lines.length * 20 + 14;
    const blockY  = y - blockH;

    // Background highlight (marker style)
    page.drawRectangle({
      x: 40, y: blockY,
      width: width - 80, height: blockH,
      color: hexToRgb(color),
      opacity: 0.18,
      borderRadius: 4,
    });
    // Left accent bar
    page.drawRectangle({
      x: 40, y: blockY,
      width: 4, height: blockH,
      color: hexToRgb(color),
      opacity: 1,
    });

    // Icon + Label
    page.drawText(`${icon}  ${label}`, {
      x: 52, y: blockY + blockH - 16,
      size: 9,
      font: fontBold,
      color: hexToRgb(color),
    });

    // Lines
    lines.forEach((line, i) => {
      if (!line || line === '—') return;
      // highlight strip behind the value text
      const textW = fontBold.widthOfTextAtSize(line, 13);
      page.drawRectangle({
        x: 50, y: blockY + blockH - 34 - i*20,
        width: Math.min(textW + 8, width - 100),
        height: 17,
        color: hexToRgb(color),
        opacity: 0.45,
        borderRadius: 2,
      });
      page.drawText(line, {
        x: 54, y: blockY + blockH - 30 - i*20,
        size: 13,
        font: fontBold,
        color: rgb(0.08, 0.08, 0.10),
      });
    });

    return blockY - 12; // next Y
  }

  // ── Header ──
  page.drawRectangle({ x:0, y: height-60, width, height:60, color: rgb(0.06,0.06,0.07) });
  page.drawText('NF·highlight', { x:40, y: height-38, size:22, font:fontBold, color: rgb(0.96,0.90,0.26) });
  page.drawText('Resumo da Nota Fiscal — gerado automaticamente', { x:40, y: height-54, size:9, font:fontNormal, color: rgb(0.4,0.4,0.45) });

  // NF number badge on the right
  const nfLabel = 'NF ' + (parsedData.nfNum || '—');
  page.drawRectangle({ x: width-120, y: height-50, width:80, height:26, color: rgb(0.96,0.60,0.26), borderRadius:4 });
  page.drawText(nfLabel, { x: width-112, y: height-40, size:12, font:fontBold, color: rgb(0.08,0.08,0.08) });

  // ── Divider ──
  page.drawLine({ start:{x:40,y:height-72}, end:{x:width-40,y:height-72}, thickness:1, color:rgb(0.16,0.16,0.18) });

  // ── Blocks ──
  let curY = height - 88;

  curY = drawHighlightedBlock({
    y: curY, icon: '🏭', label: 'EMITENTE', color: '#f5e642',
    lines: [parsedData.emitNome, parsedData.emitCNPJ].filter(Boolean),
  });

  curY = drawHighlightedBlock({
    y: curY, icon: '🔢', label: 'Nº DA NOTA FISCAL', color: '#f59642',
    lines: ['Nº ' + parsedData.nfNum].filter(v => v !== 'Nº '),
  });

  curY = drawHighlightedBlock({
    y: curY, icon: '📦', label: 'DESTINATÁRIO', color: '#42c5f5',
    lines: [parsedData.destNome, parsedData.destCNPJ, parsedData.destData ? 'Emissão: '+parsedData.destData : ''].filter(Boolean),
  });

  curY = drawHighlightedBlock({
    y: curY, icon: '💰', label: 'VALOR TOTAL DA NOTA', color: '#42f5a7',
    lines: [parsedData.valor].filter(Boolean),
  });

  if (parsedData.dados) {
    // For dados, wrap long text
    const dadosLines = wrapText(parsedData.dados, fontBold, 13, width - 110);
    curY = drawHighlightedBlock({
      y: curY, icon: '📎', label: 'NF DE ORIGEM (DADOS ADICIONAIS)', color: '#f542b0',
      lines: dadosLines,
    });
  }

  // ── Footer ──
  page.drawLine({ start:{x:40,y:50}, end:{x:width-40,y:50}, thickness:1, color:rgb(0.16,0.16,0.18) });
  const now = new Date().toLocaleString('pt-BR');
  page.drawText(`Gerado em ${now} · nenhum dado foi enviado a servidores externos`, {
    x:40, y:36, size:8, font:fontNormal, color:rgb(0.4,0.4,0.45)
  });

  // ── Save ──
  const bytes = await doc.save();
  const blob  = new Blob([bytes], { type:'application/pdf' });
  const url   = URL.createObjectURL(blob);

  // Open in new tab (works on GitHub Pages where auto-download is blocked)
  const newTab = window.open(url, '_blank');
  if (!newTab) {
    // Fallback: direct link if popup was blocked
    const a = document.createElement('a');
    a.href = url;
    a.download = `NF_${parsedData.nfNum || 'destaque'}.pdf`;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // Also update button to show a direct link
  const btn = document.getElementById('btnPDF');
  btn.textContent = '✅ PDF gerado — clique para abrir novamente';
  btn.onclick = () => window.open(url, '_blank');

  setStatus('PDF pronto! Se não abriu, verifique se popups estão permitidos.', 'ok');
}

// Simple word-wrap
function wrapText(text, font, size, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line+' '+word : word;
    if (font.widthOfTextAtSize(test, size) > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines.slice(0, 5); // max 5 lines
}
</script>
</body>
</html>
